<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 01 - Headphone Product Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <h1>GadgetGrove</h1>
      <button id="menuToggle" class="menu-button">Menu</button>
    </nav>
    <div id="mobileMenu" class="mobile-menu">
      <a href="#product">Product</a>
      <a href="#reviews">Reviews</a>
      <a href="#buy">Buy Now</a>
    </div>
  </header>

  <main class="product-layout">
    <section class="gallery">
      <!-- Could not access images.unsplash.com to find the images, so I used local images (refer to /assets folder) -->
      <img id="mainImage" src="assets/red-pulsebeat-headphones.jpg" alt="Red PulseBeat Headphones">
      <div class="thumbs">
        <button class="thumb" data-image="assets/red-pulsebeat-headphones.jpg">Red</button>
        <button class="thumb" data-image="assets/blue-pulsebeat-headphones.jpg">Blue</button>
        <button class="thumb" data-image="assets/white-pulsebeat-headphones.jpg">White</button>
      </div>
    </section>

    <section class="details" id="product">
      <p class="eyebrow">Audio Launch</p>
      <h2>PulseBeat Headphones</h2>
      <p class="price">$149.00</p>
      <p class="description">
        Wireless over-ear headphones designed for long battery life and clear everyday listening.
      </p>

      <label for="size">Choose a color</label>
      <select id="size">
        <option value="">Select color</option>
        <!-- Fixed the color options to the matching -->
        <option value="black">Red</option>
        <option value="silver">Blue</option>
        <option value="sand">White</option>
      </select>

      <button id="addToCart" class="primary-button">Add to Cart</button>
      <p id="cartMessage" class="cart-message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
