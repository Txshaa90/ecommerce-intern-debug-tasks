<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Selection Toggle</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="card">
      <h1>Pick an option</h1>
      <p id="label">Selected: None</p>
      <div class="sizes">
        <button class="size active" data-value="Small">Small</button>
        <button class="size" data-value="Medium">Medium</button>
        <button class="size" data-value="Large">Large</button>
      </div>
    </main>
    <script src="script.js">
    </script>
  </body>
</html>
